- id: research_agent
  kind: subagent
  mission: gather relevant information about a topic and return structured findings
  ttl_seconds: 180
  allowed_tools:
    - web.search
    - web.fetch
  memory_scope:
    constitution: true
    topic_pads:
      - project_vel
    event_query: limited
  return_contract: research_summary_v1
  budgets:
    max_tool_calls: 12
    max_tokens: 24000
