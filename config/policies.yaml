# Policy configuration for Vel. Required at startup. See docs/specs/vel-agent-next-steps-policy-config-commute.md

loops:
  evaluate_current_state:
    enabled: true
    interval_seconds: 300
  sync_calendar:
    enabled: true
    interval_seconds: 900
  sync_todoist:
    enabled: true
    interval_seconds: 600
  sync_activity:
    enabled: false
    interval_seconds: 300
  sync_messaging:
    enabled: true
    interval_seconds: 300
  weekly_synthesis:
    enabled: true
    interval_seconds: 86400
  stale_nudge_reconciliation:
    enabled: true
    interval_seconds: 1800

suggestions:
  enabled: true
  window_days: 7
  suppression_days: 14
  max_new_per_evaluate: 3
  commute:
    threshold: 2
    increment_minutes: 10
  prep:
    threshold: 2
    increment_minutes: 15
  response_debt:
    threshold: 3
    followup_block_minutes: 20
  morning_drift:
    threshold: 3

policies:
  meds_not_logged:
    enabled: true
    gentle_after_minutes: 10
    warning_after_minutes: 30
    danger_after_minutes: 60
    default_snooze_minutes: 10

  meeting_prep_window:
    enabled: true
    default_prep_minutes: 30
    gentle_before_minutes: 15
    warning_before_minutes: 0
    danger_before_minutes: -10
    default_snooze_minutes: 10

  commute_leave_time:
    enabled: true
    require_travel_minutes: true
    gentle_before_minutes: 20
    warning_before_minutes: 5
    danger_before_minutes: 0
    default_snooze_minutes: 5

  morning_drift:
    enabled: true
    gentle_after_minutes: 20
    warning_after_minutes: 40
    danger_after_minutes: 60
    default_snooze_minutes: 10
