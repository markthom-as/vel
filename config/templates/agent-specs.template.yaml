- id: review_worker
  kind: specialist
  mission: review a bounded implementation slice and return concrete findings with file references
  ttl_seconds: 240
  allowed_tools:
    - rg
    - cargo_test
    - repo_read
  memory_scope:
    constitution: true
    topic_pads:
      - architecture
      - verification
    event_query: recent_runs
  return_contract: review_findings_v1
  budgets:
    max_tool_calls: 16
    max_tokens: 32000
    max_memory_queries: 4

- id: connector_research_worker
  kind: subagent
  mission: map one integration family to the canonical connector contract and produce a short source-mode report
  ttl_seconds: 180
  allowed_tools:
    - repo_read
    - docs_read
    - web.search
  memory_scope:
    constitution: true
    topic_pads:
      - integrations
      - local_first
  return_contract: connector_report_v1
  budgets:
    max_tool_calls: 12
    max_tokens: 24000
