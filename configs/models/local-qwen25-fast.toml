# Fast utility profile for local dev.
# It shares the same local llama-server backend as chat to avoid a second model process.
id = "local-qwen25-fast"
provider = "llama_cpp"
base_url = "http://127.0.0.1:8012/v1"
model = "qwen2.5-1.5b-instruct-q4_k_m.gguf"
context_window = 8192
max_output_tokens = 2048
temperature = 0.1
supports_tools = true
supports_json = true
enabled = true
