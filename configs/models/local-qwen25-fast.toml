# Fast utility profile for local dev.
# Intended to point at a separate llama-server instance on port 8013.
id = "local-qwen25-fast"
provider = "llama_cpp"
base_url = "http://127.0.0.1:8013/v1"
model = "qwen2.5-coder-14b"
context_window = 8192
max_output_tokens = 2048
temperature = 0.1
supports_tools = true
supports_json = true
enabled = true
