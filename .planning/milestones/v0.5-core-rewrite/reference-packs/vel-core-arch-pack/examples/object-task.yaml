apiVersion: vel/v1
kind: ObjectType
metadata:
  name: Task
spec:
  baseTraits:
    - Completable
    - Taggable
    - Relational
    - Auditable
  fieldGroups:
    core:
      - title
      - description
      - status
      - priority
    time:
      - dueAt
      - scheduledAt
      - completedAt
      - estimatedDuration
    planning:
      - effort
      - energy
      - importance
      - urgency
      - flexibility
    sync:
      - sourceMappings
      - syncState
      - fieldOwnership
      - lastSyncedAt
  lifecycle:
    states: [draft, active, blocked, snoozed, completed, canceled, archived]
